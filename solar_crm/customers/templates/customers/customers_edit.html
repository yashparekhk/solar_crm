{% extends 'base.html' %}
{% block title %}Edit Customer — Solar CRM{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <div>
        <h4 class="fw-bold mb-0" style="color:var(--secondary);">✏️ Edit Customer</h4>
        <small class="text-muted">Update customer information</small>
    </div>
    <a href="{% url 'customers_list_view' %}" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-arrow-left me-1"></i> Back
    </a>
</div>

<div class="crm-card">
    <div class="crm-card-header">
        <h5><i class="fas fa-users me-2" style="color:var(--primary);"></i>
            Editing: {{ customer_instance.name }}
        </h5>
    </div>
    <div class="crm-card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Full Name *</label>
                    <input type="text" name="name" class="form-control"
                           value="{{ customer_instance.name }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Phone *</label>
                    <input type="text" name="phone" class="form-control"
                           value="{{ customer_instance.phone }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control"
                           value="{{ customer_instance.email }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">City *</label>
                    <input type="text" name="city" class="form-control"
                           value="{{ customer_instance.city }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">System Size (kW) *</label>
                    <input type="number" name="system_size" class="form-control"
                           value="{{ customer_instance.system_size }}" step="0.01" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Address *</label>
                    <input type="text" name="address" class="form-control"
                           value="{{ customer_instance.address }}" required>
                </div>
                <div class="col-12 d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-solar px-4">
                        <i class="fas fa-save me-1"></i> Update Customer
                    </button>
                    <a href="{% url 'customers_list_view' %}"
                       class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
