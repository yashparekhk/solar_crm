{% extends 'base.html' %}
{% block title %}Add Lead — Solar CRM{% endblock %}
{% block breadcrumb %}Leads / Add Lead{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <div>
        <h4 class="fw-bold mb-0" style="color:var(--secondary);">
            <i class="fas fa-filter me-2" style="color:var(--primary);"></i>Add New Lead
        </h4>
        <small class="text-muted">Fill in the details and assign to an employee</small>
    </div>
    <a href="{% url 'leads_list_view' %}"
       class="btn"
       style="background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;
              border-radius:7px;padding:7px 16px;font-size:0.825rem;font-weight:600;">
        <i class="fas fa-arrow-left me-1"></i> Back
    </a>
</div>

<div class="crm-card">
    <div class="crm-card-header">
        <h5><i class="fas fa-filter"></i> Lead Information</h5>
    </div>
    <div class="p-4">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">

                <!-- Row 1: Name | Phone | Email -->
                <div class="col-md-4">
                    <label class="form-label">Full Name *</label>
                    <input type="text" name="name" class="form-control"
                           placeholder="Enter full name" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Phone *</label>
                    <input type="text" name="phone" class="form-control"
                           placeholder="Phone number" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="Email address">
                </div>

                <!-- Row 2: Source | Status | Assign To -->
                <div class="col-md-4">
                    <label class="form-label">Source</label>
                    <select name="source" class="form-select">
                        <option value="">Select source</option>
                        {% for value, label in source_choices %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        {% for value, label in status_choices %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">
                        Assign To Employee
                        <span style="color:#94a3b8;font-size:0.72rem;">(optional)</span>
                    </label>
                    <select name="assigned_to" class="form-select">
                        <option value="">— Unassigned —</option>
                        {% for emp in employees_list %}
                        <option value="{{ emp.pk }}">
                            {{ emp.get_full_name }} ({{ emp.role|title }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Row 3: Address — full width textarea -->
                <div class="col-12">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control" rows="3"
                              placeholder="e.g. 12, Green Park Society, Ring Road, Surat - 395001"></textarea>
                </div>

                <!-- Row 4: Notes — full width -->
                <div class="col-12">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control" rows="3"
                              placeholder="Any notes..."></textarea>
                </div>

                <!-- Buttons -->
                <div class="col-12 d-flex gap-2 mt-1">
                    <button type="submit" class="btn btn-solar">
                        <i class="fas fa-save me-1"></i> Save Lead
                    </button>
                    <a href="{% url 'leads_list_view' %}"
                       class="btn"
                       style="background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;
                              border-radius:7px;padding:8px 16px;font-size:0.825rem;font-weight:600;">
                        Cancel
                    </a>
                </div>

            </div>
        </form>
    </div>
</div>
{% endblock %}
