{% extends 'base.html' %}
{% block title %}Add Lead — Solar CRM{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
    <div>
        <h2>➕ Add New Lead</h2>
        <p>Fill in the lead details below</p>
    </div>
    <a href="{% url 'leads_list_view' %}" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-left me-1"></i> Back to Leads
    </a>
</div>

<div class="crm-card">
    <div class="crm-card-header">
        <h5><i class="fas fa-user-plus me-2" style="color:var(--primary);"></i>Lead Information</h5>
    </div>
    <div class="crm-card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Full Name *</label>
                    <input type="text" name="name" class="form-control"
                           placeholder="Enter full name" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Phone *</label>
                    <input type="text" name="phone" class="form-control"
                           placeholder="Phone number" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="Email address">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Source</label>
                    <select name="source" class="form-select">
                        <option value="">Select source</option>
                        {% for value, label in source_choices %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        {% for value, label in status_choices %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Address</label>
                    <input type="text" name="address" class="form-control"
                           placeholder="Address">
                </div>
                <div class="col-12">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control" rows="2"
                              placeholder="Any notes..."></textarea>
                </div>
                <div class="col-12 d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-solar px-4">
                        <i class="fas fa-save me-1"></i> Save Lead
                    </button>
                    <a href="{% url 'leads_list_view' %}"
                       class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
