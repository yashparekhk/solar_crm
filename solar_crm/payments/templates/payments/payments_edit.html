{% extends 'base.html' %}
{% block title %}Edit Payment — Solar CRM{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <div>
        <h4 class="fw-bold mb-0" style="color:var(--secondary);">✏️ Edit Payment</h4>
        <small class="text-muted">Update payment details</small>
    </div>
    <a href="{% url 'payments_list_view' %}" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-arrow-left me-1"></i> Back
    </a>
</div>

<div class="crm-card">
    <div class="crm-card-header">
        <h5><i class="fas fa-rupee-sign me-2" style="color:var(--primary);"></i>
            {{ payment_instance.customer.name }} — ₹{{ payment_instance.amount }}
        </h5>
    </div>
    <div class="crm-card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Customer *</label>
                    <select name="customer" class="form-select">
                        {% for customer in customers_list %}
                        <option value="{{ customer.pk }}"
                            {% if customer.pk == payment_instance.customer.pk %}selected{% endif %}>
                            {{ customer.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Amount (₹)</label>
                    <input type="number" name="amount" class="form-control"
                           value="{{ payment_instance.amount }}" step="0.01">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Payment Method</label>
                    <select name="method" class="form-select">
                        <option value="">Select method</option>
                        {% for value, label in method_choices %}
                        <option value="{{ value }}"
                            {% if payment_instance.method == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Payment Date</label>
                    <input type="date" name="payment_date" class="form-control"
                           value="{{ payment_instance.payment_date|date:'Y-m-d' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        {% for value, label in status_choices %}
                        <option value="{{ value }}"
                            {% if payment_instance.status == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Notes</label>
                    <input type="text" name="notes" class="form-control"
                           value="{{ payment_instance.notes }}">
                </div>
                <div class="col-12 d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-solar px-4">
                        <i class="fas fa-save me-1"></i> Update Payment
                    </button>
                    <a href="{% url 'payments_list_view' %}"
                       class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
