{% extends 'base.html' %}
{% block title %}Delete Quotation — Solar CRM{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="crm-card">
            <div class="crm-card-header" style="background:#fee2e2;">
                <h5 class="text-danger">🗑️ Delete Quotation</h5>
            </div>
            <div class="crm-card-body text-center">
                <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
                <p class="fw-bold">Delete quotation:</p>
                <p class="fs-5"><strong>{{ quotation_instance.quotation_no }}</strong></p>
                <p class="text-muted small">This action cannot be undone.</p>
                <form method="POST" class="d-flex gap-2 justify-content-center mt-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash me-1"></i> Yes, Delete
                    </button>
                    <a href="{% url 'quotations_list_view' %}"
                       class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
