{% extends 'base.html' %}
{% block title %}Delete Ticket{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="crm-card">
            <div class="crm-card-header" style="background:#fee2e2;">
                <h5 class="text-danger">Delete Ticket</h5>
            </div>
            <div class="crm-card-body text-center">
                <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
                <p class="fw-bold">Delete ticket:</p>
                <p class="fs-6"><strong>#{{ ticket_instance.pk }} — {{ ticket_instance.title }}</strong></p>
                <p class="text-muted small">This action cannot be undone.</p>
                <form method="POST" class="d-flex gap-2 justify-content-center mt-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'tickets_list_view' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
