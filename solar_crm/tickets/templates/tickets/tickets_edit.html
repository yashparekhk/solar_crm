{% extends 'base.html' %}
{% block title %}Edit Ticket — Solar CRM{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <div>
        <h4 class="fw-bold mb-0" style="color:var(--secondary);">✏️ Edit Ticket #{{ ticket_instance.pk }}</h4>
        <small class="text-muted">{{ ticket_instance.title }}</small>
    </div>
    <a href="{% url 'tickets_list_view' %}" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-arrow-left me-1"></i> Back
    </a>
</div>

<div class="crm-card">
    <div class="crm-card-header">
        <h5><i class="fas fa-ticket-alt me-2" style="color:var(--primary);"></i>
            Ticket #{{ ticket_instance.pk }}
        </h5>
    </div>
    <div class="crm-card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Title *</label>
                    <input type="text" name="title" class="form-control"
                           value="{{ ticket_instance.title }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Customer *</label>
                    <select name="customer" class="form-select" required>
                        {% for customer in customers_list %}
                        <option value="{{ customer.pk }}"
                            {% if customer.pk == ticket_instance.customer.pk %}selected{% endif %}>
                            {{ customer.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select">
                        {% for value, label in category_choices %}
                        <option value="{{ value }}"
                            {% if ticket_instance.category == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Priority</label>
                    <select name="priority" class="form-select">
                        {% for value, label in priority_choices %}
                        <option value="{{ value }}"
                            {% if ticket_instance.priority == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        {% for value, label in status_choices %}
                        <option value="{{ value }}"
                            {% if ticket_instance.status == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Assigned To</label>
                    <select name="assigned_to" class="form-select">
                        <option value="">Unassigned</option>
                        {% for user in users_list %}
                        <option value="{{ user.pk }}"
                            {% if ticket_instance.assigned_to and ticket_instance.assigned_to.pk == user.pk %}selected{% endif %}>
                            {{ user.get_full_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Description *</label>
                    <textarea name="description" class="form-control"
                              rows="3" required>{{ ticket_instance.description }}</textarea>
                </div>
                <div class="col-12">
                    <label class="form-label">Internal Notes</label>
                    <textarea name="notes" class="form-control"
                              rows="2">{{ ticket_instance.notes }}</textarea>
                </div>
                <div class="col-12 d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-solar px-4">
                        <i class="fas fa-save me-1"></i> Update Ticket
                    </button>
                    <a href="{% url 'tickets_list_view' %}"
                       class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
